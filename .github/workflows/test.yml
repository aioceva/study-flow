name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npm test

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.DATA_GITHUB_TOKEN }}
      GITHUB_OWNER: ${{ secrets.DATA_GITHUB_OWNER }}
      GITHUB_REPO: ${{ secrets.DATA_GITHUB_REPO }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      E2E_SKIP_AUTH: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
